<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設計稿實作 - 捲軸版</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .preview-container {
            width: 496px;
            background-color: white;
            border: 1px solid #eaeaea;
            /* 根據圖中提示：整體高度若超過需捲動，這裡設定一個示意的高度限制 */
            display: flex;
            flex-direction: column;
        }

        .header-bar {
            background-color:#707070;
            padding: 10px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eaeaea;
            position:relative;
        }

        .header-title {
            color: gray;
            font-size: 14px;
        }

        .info-btn {
            height: 22px;
            padding: 0 12px;
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            border-radius: 8px; /* 圓角化，符合圖中按鈕外觀 */
            color: #2f2f2f;
            font-size: 13px;
            cursor: pointer;
            position:absolute;
            right: 22px;
            top: 10px;
        }

        .scrollable-content {
            max-height: 400px; /* 設定最大高度觸發捲軸 */
            overflow-y: auto;  /* 縱向自動捲動 */
            padding: 0 20px 26px 20px; /* 左右間距參考藍線 20/26 */
        }

        /* 客製化捲軸樣式 (讓它看起來更像設計圖) */
        .scrollable-content::-webkit-scrollbar {
            width: 8px;
        }
        .scrollable-content::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .scrollable-content::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        .preview-img {
            width: 100%;
            height: auto;
            margin: 20px 0;
            display: block;
        }

        .info-row {
            padding: 6px 10px;
            font-size: 13px;
            color: #2f2f2f;
            margin-bottom: 4px;
            word-break: break-all;
        }

        .bg-green {
            background-color: #90ee90; 
        }
    </style>
</head>
<body>

    <div class="preview-container">
        <div class="header-bar">
            <span class="header-title">預覽</span>
            <button id="toggleBtn" class="info-btn">收起資訊</button>
        </div>

        <div class="scrollable-content">
            <img src="https://picsum.photos/450/240" alt="Preview" class="preview-img">
            
            <div id="infoSection" class="detail-info" style="display: block;">
                <div class="info-row bg-green"></div>
                <div class="info-row bg-green"></div>
                <div class="info-row bg-green"></div>
                <div class="info-row bg-green">
                   
                </div>
                <div class="info-row bg-green"></div>
                <div class="info-row bg-green">.</div>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('toggleBtn');
        const info = document.getElementById('infoSection');

        btn.addEventListener('click', () => {
            if (info.style.display === 'none') {
                info.style.display = 'block';
                btn.textContent = '收起資訊';
            } else {
                info.style.display = 'none';
                btn.textContent = '查看資訊';
            }
        });
    </script>
</body>
</html>
