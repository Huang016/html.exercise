<!DOCTYPE html>
<html>
<body>

    <canvas id="myCanvas" width="500" height="300" style="border:1px solid #d3d3d3;">
        Your browser does not support the HTML5 canvas tag.
    </canvas>

    <script>
        var c = document.getElementById("myCanvas");
        var ctx = c.getContext("2d");

        ctx.fillStyle = "blue";
        ctx.fillRect(20, 50, 150, 150);
        ctx.lineWidth = 5;
        ctx.strokeStyle = "black";
        ctx.strokeRect(20, 50, 150, 150);

        ctx.beginPath();
        
        ctx.arc(170, 125, 70, 0, 2 * Math.PI); 
        ctx.fillStyle = "yellow";
        ctx.fill();
        ctx.lineWidth = 5;
        ctx.strokeStyle = "red";
        ctx.stroke();
    </script>

</body>
</html>
