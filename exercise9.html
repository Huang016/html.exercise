<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Web Page Assignment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
            background-color: #f0f0f0;
        }

        .container {
            background-color: white;
            padding: 40px;
            border: 1px solid #ddd;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            min-height: 300px;
        }

        table {
            border-collapse: collapse;
            width: 300px;
            border: 2px solid #333;
        }

        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #666;
            color: white;
            font-weight: bold;
        }

        tr:nth-of-type(odd) td {
            background-color: yellow;
        }

        tr:nth-of-type(even) td {
            background-color: white;
        }

        .fixed-box {
            position: fixed;
            top: 50px;
            right: 50px;
            width: 150px;
            height: 120px;
            border: 3px solid green; 
            padding: 10px;
            background-color: white;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Firstname</th>
                    <th>Lastname</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>1</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>2</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>3</td>
                </tr>
            </tbody>
        </table>

        <div class="fixed-box">
            This div element has position: fixed;
        </div>
    </div>

</body>
</html>
