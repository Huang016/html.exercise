<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .x {
           
            border:5px solid rgb(241, 86, 55);
            width: 25%;
            border-style: double;
            background-color:rgb(65, 131, 206); 
            font-size: 20px;
        }
        .y {
        
            border:3px solid blue;
            background-color: yellow;
            border-radius: 5px;
            width: 25%;
            font-size: 20px;
        }
        .z {
            
            border:5px solid grey;
            border-style: dotted;
            background-color: green;
            width: 25%;
            font-size: 20px;
        }
    </style>

</head>
<body>
    <p class="x">hello world</p>
    <p class="y">hello world</p>
    <p class="z">hello world</p>
</body>
</html>
