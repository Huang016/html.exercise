<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>

        h1 {
            border-top: 4px solid black; 
            text-shadow: 3px 3px 1px rgb(216, 139, 196);
            width: 300px;
            padding-top: 10px;
            margin-bottom: 20px;
            font-size: 32px;
        }

        h2 {
            border: 3px inset #ffd700; 
            padding: 10px;
            width: 300px;
            margin-bottom: 20px;
            font-style: italic;
            outline-color:black;
    
        }

        h3 {
            text-align: right;  
            text-decoration: underline; 
            font-size: 24px;
            position:absolute;
            left: 150px;
        }

    </style>
</head>
<body>
    <h1>This is heading 1</h1>
        
    <h2>This is heading 2</h2>
        
    <h3>This is heading 3</h3>

</body>
</html>
