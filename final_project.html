<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湛藍守護：台灣海域數據平台</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* --- 基礎設定與色彩計畫 --- */
        :root {
            --deep-blue: #002244;
            --coral-orange: #FF7F50;
            --light-bg: #F0FFFF;
            --white: #ffffff;
            --danger-red: #ff4d4d;
            --warning-yellow: #ffcc00;
            --safe-green: #33cc33;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: "微軟正黑體", sans-serif;
            background-color: var(--light-bg);
            color: #181717; scroll-behavior: smooth;
        }

        /* 導覽列 */
        nav { 
            background-color: var(--deep-blue); padding: 15px 30px; position: fixed; 
            width: 100%; top: 0; z-index: 2000; display: flex; justify-content: space-between; 
            align-items: center; box-sizing: border-box; 
        }
        nav .logo { color: var(--white); font-size: 1.5rem; font-weight: bold; }
        nav a { color: var(--white); text-decoration: none; margin: 0 15px; font-weight: bold; transition: color 0.3s; }
        nav a:hover { color: var(--coral-orange); }

        /* 主視覺 (Hero Section) */
        .hero {
            background-image: linear-gradient(rgba(0, 34, 68, 0.7), rgba(0, 34, 68, 0.7)), 
                             url('https://images.unsplash.com/photo-1611273426858-450d8e3c9fce?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            height: 100vh; background-attachment: fixed; background-position: center; background-size: cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: var(--white); text-align: center;
        }
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; }
        .hero p { font-size: 1.5rem; margin-bottom: 30px; }
        .cta-btn { 
            background-color: var(--coral-orange); color: var(--white); padding: 15px 30px; 
            text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.3s;
        }
        .cta-btn:hover { background-color: #ff6329; transform: scale(1.05); }

        /* 地圖區域 */
        section { padding: 80px 5%; text-align: center; }
        section h2 { color: var(--deep-blue); font-size: 2.5rem; margin-bottom: 20px; }

        .map-wrapper {
            position: relative; width: 95%; max-width: 1200px; height: 600px; 
            margin: 0 auto; border-radius: 20px; overflow: hidden; border: 5px solid var(--deep-blue);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        #map { width: 100%; height: 100%; background: #001122; }

        /* 數據儀表板 (Dashboard) */
        .dashboard {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 34, 68, 0.85); color: white; padding: 20px;
            border-radius: 15px; backdrop-filter: blur(10px); width: 240px; text-align: left;
            border: 1px solid rgba(255,255,255,0.2); pointer-events: none;
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 12px; font-size: 0.9rem; }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; }

        /* 雷達閃爍動畫 */
        .radar-ping { border-radius: 50%; position: relative; }
        .radar-ping::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%; animation: pulse 2s infinite ease-out; border: 2px solid inherit;
        }
        @keyframes pulse { 
            0% { transform: scale(1); opacity: 1; } 
            100% { transform: scale(4); opacity: 0; } 
        }

        footer { background: var(--deep-blue); color: white; padding: 30px; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">🌊 湛藍守護</div>
        <div>
            <a href="#home">首頁</a>
            <a href="#map-section">衛星監測平台</a>
            <button onclick="updateData()" style="background:var(--coral-orange); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold; margin-left:15px;">🔄 更新數據</button>
        </div>
    </nav>

    <header class="hero" id="home">
        <h1>海域垃圾數據視覺化</h1>
        <p>結合衛星影像與數據分級，追蹤 SDG 14 執行成效</p>
        <a href="#map-section" class="cta-btn">啟動衛星監測</a>
    </header>

    <section id="map-section">
        <h2>即時海域廢棄物監測圖</h2>
        <p style="margin-bottom: 40px; max-width: 800px; margin-left: auto; margin-right: auto;">
            透過統整政府與開源觀測資料，我們將台灣周邊海域垃圾密度劃分為三個警戒等級，並動態標示於衛星影像上。
        </p>
        
        <div class="map-wrapper">
            <div class="dashboard">
                <h3 style="margin:0 0 15px 0; font-size:1.1rem; border-bottom:1px solid rgba(255,255,255,0.3); padding-bottom:5px;">衛星數據分析</h3>
                <div class="legend-item"><div class="dot" style="background:var(--danger-red)"></div>Level 3：重度污染</div>
                <div class="legend-item"><div class="dot" style="background:var(--warning-yellow)"></div>Level 2：中度警戒</div>
                <div class="legend-item"><div class="dot" style="background:var(--safe-green)"></div>Level 1：正常海域</div>
                <hr style="opacity:0.3; margin: 15px 0;">
                <div id="sync-time" style="font-size:0.8rem; color:#88ddee;">📡 接收衛星信號中...</div>
            </div>
            <div id="map"></div>
        </div>
    </section>

    <footer>
        <p>Group X Final Project Proposal</p>
        <p style="font-size: 0.8rem; opacity: 0.7; margin-top: 10px;">資料來源：政府資料開放平台、Google Satellite、Unsplash 模擬圖</p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 初始化地圖 (鎖定台灣)
        var map = L.map('map', {
            center: [23.7, 121.0],
            zoom: 7.5,
            zoomControl: false,
            maxBounds: [[20, 116], [27, 124]] // 限制滑動範圍在台灣海域
        });

        // 2. 載入 Google 衛星影像
        L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
            attribution: '© Google Satellite'
        }).addTo(map);

        var markersLayer = L.layerGroup().addTo(map);
        var statusColors = { danger: "#ff4d4d", warning: "#ffcc00", safe: "#33cc33" };

        // 3. 數據更新邏輯
        async function updateData() {
            document.getElementById('sync-time').innerText = "📡 正在接收衛星信號...";
            
            // 這裡可以換成真實的 fetch('API_URL')
            const locations = [
                { name: "基隆 潮境公園", lat: 25.14, lng: 121.80, level: "danger" },
                { name: "桃園 觀音海岸", lat: 25.04, lng: 121.08, level: "danger" },
                { name: "彰化 伸港濕地", lat: 24.15, lng: 120.45, level: "warning" },
                { name: "雲林 麥寮海岸", lat: 23.75, lng: 120.15, level: "danger" },
                { name: "屏東 小琉球", lat: 22.34, lng: 120.37, level: "safe" },
                { name: "宜蘭 壯圍沙丘", lat: 24.75, lng: 121.83, level: "warning" },
                { name: "花蓮 七星潭", lat: 24.03, lng: 121.63, level: "safe" },
                { name: "澎湖 馬公海域", lat: 23.57, lng: 119.57, level: "warning" }
            ];

            markersLayer.clearLayers();

            locations.forEach(loc => {
                const color = statusColors[loc.level];
                
                // 建立雷達效果圖標
                const icon = L.divIcon({
                    className: 'radar-ping',
                    html: `<div style="background:${color}; width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow:0 0 10px ${color};">
                             <div style="width:100%; height:100%; border-radius:50%; border:2px solid ${color}; animation:pulse 2s infinite ease-out;"></div>
                           </div>`,
                    iconSize: [12, 12],
                    iconAnchor: [6, 6]
                });

                L.marker([loc.lat, loc.lng], { icon: icon })
                    .addTo(markersLayer)
                    .bindPopup(`<b>${loc.name}</b><br>狀態：${loc.level === 'danger' ? '⚠️ 重度污染' : (loc.level === 'warning' ? '🟡 中度警戒' : '✅ 正常')}`);
            });

            document.getElementById('sync-time').innerText = "🕒 最後同步：" + new Date().toLocaleTimeString();
        }

        // 初始化與定時更新
        updateData();
        setInterval(updateData, 30000); // 30秒自動更新一次
    </script>
</body>
</html>
